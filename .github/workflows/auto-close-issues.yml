name: Auto Close Issues

on:
  issues:
    types: [labeled]

jobs:
  close-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Close issue if labeled completed or wontfix
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = context.payload.issue.labels.map(label => label.name);
            const closeLabels = ['completed', 'wontfix'];
            
            if (labels.some(label => closeLabels.includes(label))) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                state: 'closed',
                state_reason: labels.includes('completed') ? 'completed' : 'not_planned'
              });
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: 'This issue has been automatically closed because it was labeled as ' + labels.find(label => closeLabels.includes(label)) + '.'
              });
            }
